services:
  mysql:
    image: mysql:8.0
    container_name: mes-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mes_core}
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mes_mysql_data:/var/lib/mysql
      - ./database/mysql_schema.sql:/docker-entrypoint-initdb.d/01-mysql_schema.sql:ro
      - ./database/mysql_seed.sql:/docker-entrypoint-initdb.d/02-mysql_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mes-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3000
      MES_DATA_DRIVER: mysql
      MES_JWT_SECRET: ${MES_JWT_SECRET:-replace-with-a-strong-secret}
      MES_JWT_TTL_SECONDS: 28800
      MES_AUTH_COOKIE_NAME: mes_session
      MES_AUTH_REFRESH_COOKIE_NAME: mes_refresh
      MES_COOKIE_SECURE: "false"
      MES_REQUEST_LOG: "true"
      MES_ACCESS_TOKEN_TTL_SECONDS: ${MES_ACCESS_TOKEN_TTL_SECONDS:-900}
      MES_REFRESH_TOKEN_TTL_SECONDS: ${MES_REFRESH_TOKEN_TTL_SECONDS:-604800}
      MES_SESSION_IDLE_TIMEOUT_SECONDS: ${MES_SESSION_IDLE_TIMEOUT_SECONDS:-28800}
      MES_MAX_ACTIVE_SESSIONS: ${MES_MAX_ACTIVE_SESSIONS:-5}
      MES_MYSQL_HOST: mysql
      MES_MYSQL_PORT: 3306
      MES_MYSQL_DATABASE: ${MYSQL_DATABASE:-mes_core}
      MES_MYSQL_USER: root
      MES_MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
    ports:
      - "3000:3000"

volumes:
  mes_mysql_data:
